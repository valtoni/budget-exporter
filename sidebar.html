<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrato</title>
    <link rel="stylesheet" href="sidebar.bundle.css">
</head>
<body>
    <div class="app-shell">

        <header class="ex-header">
            <h1 class="ex-title">Extrato</h1>
            <div class="ex-account">
                <span id="ex-account-name" class="ex-account-name">Sem conta detectada</span>
                <button type="button" id="ex-cutoff-trigger" class="ex-cutoff-trigger" title="Exportar a partir de">
                    <span id="ex-cutoff-label">—</span>
                    <svg class="caret" viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
                        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <input type="text" id="ex-cutoff-input" class="ex-cutoff-input" aria-hidden="true" tabindex="-1">
            </div>
        </header>

        <nav class="ex-filters" id="ex-filters" role="tablist" aria-label="Filtro de transações">
            <button class="ex-filter is-active" data-filter="all" type="button" role="tab">
                <span>Todas</span><span class="ex-count" data-count="all">0</span>
            </button>
            <button class="ex-filter" data-filter="matched" type="button" role="tab">
                <span>Com regra</span><span class="ex-count" data-count="matched">0</span>
            </button>
            <button class="ex-filter" data-filter="unmatched" type="button" role="tab">
                <span>Sem regra</span><span class="ex-count" data-count="unmatched">0</span>
            </button>
        </nav>

        <main class="ex-main">
            <datalist id="category-options"></datalist>
            <extract-grid id="ex-grid"></extract-grid>
            <div id="ex-error" class="ex-error" hidden></div>
        </main>

        <footer class="ex-footer">
            <div class="ex-footer-status">
                <strong id="ex-selected-count">0</strong>
                <span>selecionadas</span>
            </div>

            <button type="button" id="ex-refresh" class="ex-icon-btn" title="Atualizar transações" aria-label="Atualizar transações">
                <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                    <path d="M2.5 8a5.5 5.5 0 0 1 9.4-3.9M13.5 8a5.5 5.5 0 0 1-9.4 3.9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <path d="M9.5 2.5h3v3M6.5 13.5h-3v-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <wa-dropdown id="ex-menu" placement="top-end">
                <button type="button" slot="trigger" class="ex-icon-btn" title="Mais ações" aria-label="Mais ações">
                    <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                        <circle cx="3" cy="8" r="1.4" fill="currentColor"/>
                        <circle cx="8" cy="8" r="1.4" fill="currentColor"/>
                        <circle cx="13" cy="8" r="1.4" fill="currentColor"/>
                    </svg>
                </button>
                <wa-dropdown-item id="menu-export">Exportar CSV</wa-dropdown-item>
                <wa-dropdown-item id="menu-change-dest" hidden>Trocar destino YNAB</wa-dropdown-item>
                <wa-divider></wa-divider>
                <wa-dropdown-item id="menu-manage">Abrir gestão completa</wa-dropdown-item>
            </wa-dropdown>

            <wa-button id="ex-secondary" size="small" appearance="outlined" hidden>
                <span id="ex-secondary-label">Configurar YNAB</span>
            </wa-button>

            <wa-button id="ex-primary" size="small" variant="brand">
                <span id="ex-primary-label">Exportar CSV</span>
            </wa-button>
        </footer>
    </div>

    <!-- Rule dialog -->
    <wa-dialog id="rule-dialog" label="Criar regra">
        <form id="rule-form" class="rule-form">
            <p class="rule-context" id="rule-context">Baseado em uma transação</p>
            <label class="field">
                <span>Conta</span>
                <input id="rule-account-name" type="text" readonly>
            </label>
            <label class="field">
                <span>Padrão</span>
                <input id="rule-pattern" type="text" required placeholder="Texto a casar no payee">
            </label>
            <label class="field">
                <span>Substituir por</span>
                <input id="rule-replacement" type="text" placeholder="Como deve aparecer no YNAB">
            </label>
            <label class="field">
                <span>Categoria</span>
                <select id="rule-category"><option value="">Opcional</option></select>
            </label>
            <label class="field">
                <span>Memo template</span>
                <input id="rule-memo" type="text" placeholder="Opcional">
            </label>
            <label class="checkbox-row">
                <input id="rule-regex" type="checkbox">
                Usar regex
            </label>
            <div id="rule-message" class="rule-message" hidden></div>
        </form>
        <wa-button slot="footer" variant="brand" id="rule-submit">Salvar regra</wa-button>
        <wa-button slot="footer" appearance="plain" id="rule-cancel">Cancelar</wa-button>
    </wa-dialog>

    <!-- YNAB destination dialog -->
    <wa-dialog id="dest-dialog" label="Destino YNAB">
        <p class="dialog-helper">Escolha a conta YNAB de destino para esta sessão.</p>
        <select id="dest-select" title="Conta YNAB de destino" aria-label="Conta YNAB de destino"></select>
        <wa-button slot="footer" variant="brand" id="dest-confirm">Usar esta conta</wa-button>
    </wa-dialog>

    <!-- Toast -->
    <wa-callout id="ex-toast" variant="success" appearance="filled" class="ex-toast" hidden>
        <span id="ex-toast-msg"></span>
    </wa-callout>

    <!-- Sync overlay -->
    <div id="sync-overlay" class="sync-overlay" hidden>
        <div class="sync-spinner"></div>
        <p class="sync-label">Sincronizando com YNAB…</p>
    </div>

    <script src="bank-utils.js"></script>
    <script src="storage-manager.js"></script>
    <script type="module" src="sidebar.bundle.js"></script>
</body>
</html>
